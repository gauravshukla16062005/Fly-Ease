<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Flights | Fly-Ease</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">
<img src="logoflyease.png">
<h2>Fly-Ease</h2>
</div>

<nav>
<a href="home.html">Home</a>
<a href="login.html">Login</a>
<a href="searchFlights.html">Search Flights</a>
</nav>
</header>


<div class="search-box">

<h2>Find Flights</h2>

<div class="search-grid">

<input id="from" placeholder="From (Delhi)">
<input id="to" placeholder="To (Mumbai)">
<input id="date" type="date">

<button onclick="searchFlights()">Search Flights</button>

</div>

</div>


<script>

function searchFlights(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value
let date=document.getElementById("date").value

window.location=
`flightResults.html?source=${from}&destination=${to}&date=${date}`

}

</script>

</body>
</html>
