<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Register | Fly-Ease</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
<img src="logoflyease.png" alt="Fly-Ease Logo">
<h2>Fly-Ease</h2>
</div>

<nav>
<a href="home.html">Home</a>
<a href="login.html">Login</a>
<a href="searchFlights.html">Search Flights</a>
<a href="adminDashboard.html">Admin</a>
</nav>

</header>


<section class="register-section">

<div class="register-card">

<h2>Create Your Fly-Ease Account</h2>

<form id="registerForm">

<label>Full Name</label>
<input id="name" type="text" placeholder="Enter your full name" required>

<label>Email</label>
<input id="email" type="email" placeholder="Enter your email" required>

<label>Password</label>
<input id="password" type="password" placeholder="Create a password" required>

<label>Confirm Password</label>
<input id="confirmPassword" type="password" placeholder="Re-enter your password" required>

<button type="submit">Register</button>

</form>

<p class="login-link">
Already have an account?
<a href="login.html">Login here</a>
</p>

</div>

</section>


<footer>
<p>Fly-Ease | Flight Booking System</p>
<p>Tech Stack: Frontend | Node.js | MySQL</p>
</footer>


<script>

document.getElementById("registerForm").addEventListener("submit", async function(event){

event.preventDefault()

let name=document.getElementById("name").value.trim()
let email=document.getElementById("email").value.trim()
let password=document.getElementById("password").value.trim()
let confirmPassword=document.getElementById("confirmPassword").value.trim()

if(password!==confirmPassword){

alert("Passwords do not match")
return

}

if(!name || !email || !password){

alert("Please fill all fields")
return

}

try{

let response = await fetch("http://127.0.0.1:3000/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
password:password
})

})

let text = await response.text()

let data

try{

data = JSON.parse(text)

}catch{

console.log("Invalid JSON response:",text)
alert("Server returned invalid response")
return

}

console.log("SERVER RESPONSE:",data)

if(data.success){

alert("Account Created Successfully")

window.location.href="login.html"

}else{

alert(data.message || "Registration Failed")

}

}

catch(error){

console.log("FETCH ERROR:",error)

alert("Server Error")

}

})

</script>

    <script src="js/common.js"></script>
<script src="js/register.js"></script>


</body>
</html>
