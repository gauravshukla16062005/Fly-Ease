<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Fly-Ease</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER / NAVBAR -->
    <header>
        <div class="logo">
            <img src="logoflyease.png" alt="Fly-Ease Logo">
            <h2>Fly-Ease</h2>
        </div>
        <nav>
            <a href="home.html">Home</a>
            <a href="login.html">Login</a>
            <a href="searchFlights.html">Search Flights</a>
            <a href="adminDashboard.html">Admin</a>
        </nav>
    </header>

    <!-- REGISTER SECTION -->
    <section class="register-section">
        <div class="register-card">
            <h2>Create Your Fly-Ease Account</h2>

            <form>
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>

                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" placeholder="Create a password" required>

                <label>Confirm Password</label>
                <input type="password" placeholder="Re-enter your password" required>

                <button type="submit">Register</button>
            </form>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login here</a>
            </p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Fly-Ease | Flight Booking System</p>
        <p>Tech Stack: Frontend | Java | MySQL</p>
    </footer>

    <script src="js/common.js"></script>
<script src="js/register.js"></script>


</body>
</html>
